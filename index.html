<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bynoor.io</title>
    <meta name="description" content="bynoor.io - something new is taking shape.">
    <meta property="og:title" content="bynoor.io">
    <meta property="og:description" content="Something new is taking shape.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://bynoor.io">
    <meta name="twitter:card" content="summary">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cyan: #00d4ff;
            --violet: #7b61ff;
            --cyan-dim: rgba(0, 212, 255, 0.6);
            --violet-dim: rgba(123, 97, 255, 0.5);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #030305;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Grain texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* Canvas behind everything */
        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
        }

        /* Aurora orbs layered on canvas */
        .aurora {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            will-change: transform;
        }

        .orb-1 {
            width: 60vmax;
            height: 60vmax;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.10), transparent 70%);
            top: -25%;
            right: -20%;
            animation: drift1 30s ease-in-out infinite;
        }

        .orb-2 {
            width: 55vmax;
            height: 55vmax;
            background: radial-gradient(circle, rgba(123, 97, 255, 0.08), transparent 70%);
            bottom: -30%;
            left: -20%;
            animation: drift2 38s ease-in-out infinite;
        }

        .orb-3 {
            width: 35vmax;
            height: 35vmax;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.05), transparent 70%);
            top: 40%;
            left: 30%;
            animation: drift3 24s ease-in-out infinite;
        }

        @keyframes drift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-60px, 80px) scale(1.1); }
            50% { transform: translate(20px, -30px) scale(0.95); }
            75% { transform: translate(40px, 50px) scale(1.05); }
        }

        @keyframes drift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(60px, -40px) scale(1.08); }
            50% { transform: translate(-30px, 60px) scale(0.9); }
            75% { transform: translate(-50px, -20px) scale(1.04); }
        }

        @keyframes drift3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-70px, -50px) scale(1.15); }
            50% { transform: translate(50px, 30px) scale(0.85); }
            75% { transform: translate(20px, -60px) scale(1.1); }
        }

        /* Vignette */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(3, 3, 5, 0.7) 100%);
        }

        /* Scene */
        .scene {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 2rem;
            perspective: 800px;
        }

        /* Card with animated gradient border */
        .card-wrapper {
            position: relative;
            max-width: 580px;
            width: 100%;
            border-radius: 30px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(123, 97, 255, 0.05), rgba(0, 212, 255, 0.0), rgba(123, 97, 255, 0.12));
            background-size: 300% 300%;
            animation: borderShift 8s ease-in-out infinite;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.15s ease-out;
        }

        @keyframes borderShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .card {
            text-align: center;
            padding: 4.5rem 3.5rem;
            border-radius: 29px;
            background: rgba(8, 8, 14, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        /* Logo */
        .logo {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-weight: 800;
            font-size: clamp(3.4rem, 10vw, 6rem);
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 0.3em;
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            animation: logoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
        }

        .logo .accent {
            background: linear-gradient(135deg, var(--cyan), var(--violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes logoIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .tagline {
            font-size: clamp(0.72rem, 1.6vw, 0.88rem);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.32em;
            text-transform: uppercase;
            margin-bottom: 2.8rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.55s forwards;
        }

        .tagline .cursor {
            display: inline-block;
            width: 1px;
            height: 1em;
            background: var(--cyan);
            margin-left: 3px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Gradient divider */
        .divider {
            width: 56px;
            height: 1px;
            margin: 0 auto 2.4rem;
            position: relative;
            opacity: 0;
            animation: fadeIn 1.2s ease 0.75s forwards;
        }

        .divider::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, var(--cyan-dim), var(--violet-dim), transparent);
        }

        .divider::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 5px;
            background: var(--cyan);
            filter: blur(4px);
            opacity: 0.5;
            animation: glowPulse 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; width: 20px; }
            50% { opacity: 0.7; width: 35px; }
        }

        /* Links with individual stagger */
        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.6rem;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.5);
            padding: 11px 22px;
            border-radius: 100px;
            font-size: 0.82rem;
            font-weight: 400;
            letter-spacing: 0.02em;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .links a:nth-child(1) { animation-delay: 0.9s; }
        .links a:nth-child(2) { animation-delay: 1.0s; }
        .links a:nth-child(3) { animation-delay: 1.1s; }
        .links a:nth-child(4) { animation-delay: 1.2s; }

        .links a::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(123, 97, 255, 0.1));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .links a::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.15), transparent 70%);
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 50%;
        }

        .links a:hover {
            color: #fff;
            border-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.1), 0 0 15px rgba(0, 212, 255, 0.05);
        }

        .links a:hover::before { opacity: 1; }
        .links a:hover::after { transform: translate(-50%, -50%) scale(1); }

        .links a svg {
            width: 15px;
            height: 15px;
            flex-shrink: 0;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .links a:hover svg {
            opacity: 1;
            filter: drop-shadow(0 0 4px rgba(0, 212, 255, 0.4));
        }

        /* Status indicator */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 3rem;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.18);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0;
            animation: fadeIn 1s ease 1.5s forwards;
        }

        .pulse {
            width: 5px;
            height: 5px;
            background: var(--cyan);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
        }

        .pulse::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 1px solid rgba(0, 212, 255, 0.25);
            animation: pulseRing 2.5s ease-out infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .card {
                padding: 3rem 1.8rem;
                border-radius: 22px;
            }

            .card-wrapper {
                border-radius: 23px;
            }

            .links {
                gap: 0.45rem;
            }

            .links a {
                padding: 9px 16px;
                font-size: 0.76rem;
            }

            .tagline {
                margin-bottom: 2rem;
                letter-spacing: 0.18em;
            }

            .divider {
                margin-bottom: 1.6rem;
            }

            .status {
                margin-top: 2rem;
            }
        }

        @media (max-width: 380px) {
            .card {
                padding: 2.2rem 1.3rem;
                border-radius: 18px;
            }

            .card-wrapper {
                border-radius: 19px;
            }

            .links a {
                padding: 8px 13px;
                font-size: 0.73rem;
                gap: 0.35rem;
            }

            .links a svg {
                width: 13px;
                height: 13px;
            }
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            .card-wrapper { animation: none; }
        }
    </style>
</head>
<body>

        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

    </div>

    <script>
        // ---- Interactive Particle Constellation ----
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let W, H, particles, mouse = { x: -9999, y: -9999 };
        const isMobile = !window.matchMedia('(pointer: fine)').matches;
        const PARTICLE_COUNT_FACTOR = isMobile ? 22000 : 12000;
        const CONNECT_DIST = isMobile ? 100 : 140;
        const MOUSE_RADIUS = 120;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.r = Math.random() * 1.8 + 0.4;
                this.baseAlpha = Math.random() * 0.4 + 0.15;
                this.alpha = this.baseAlpha;
                // Color: mix of cyan and violet
                const t = Math.random();
                this.cr = Math.round(0 + t * 123);
                this.cg = Math.round(212 - t * 115);
                this.cb = Math.round(255);
            }
            update() {
                // Mouse repulsion
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < MOUSE_RADIUS && dist > 0) {
                    const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
                    const angle = Math.atan2(dy, dx);
                    this.vx += Math.cos(angle) * force * 0.6;
                    this.vy += Math.sin(angle) * force * 0.6;
                    this.alpha = Math.min(1, this.baseAlpha + force * 0.6);
                } else {
                    this.alpha += (this.baseAlpha - this.alpha) * 0.02;
                }

                // Damping
                this.vx *= 0.99;
                this.vy *= 0.99;

                this.x += this.vx;
                this.y += this.vy;

                // Wrap edges
                if (this.x < -10) this.x = W + 10;
                if (this.x > W + 10) this.x = -10;
                if (this.y < -10) this.y = H + 10;
                if (this.y > H + 10) this.y = -10;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.cr},${this.cg},${this.cb},${this.alpha})`;
                ctx.fill();
            }
        }

        function initParticles() {
            const count = Math.min(Math.floor((W * H) / PARTICLE_COUNT_FACTOR), isMobile ? 60 : 140);
            particles = Array.from({ length: count }, () => new Particle());
        }

        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = dx * dx + dy * dy;
                    const maxDist = CONNECT_DIST * CONNECT_DIST;
                    if (dist < maxDist) {
                        const opacity = (1 - dist / maxDist) * 0.18;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(0, 212, 255, ${opacity})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, W, H);
            particles.forEach(p => { p.update(); p.draw(); });
            drawConnections();
            requestAnimationFrame(animate);
        }

        resize();
        initParticles();
        animate();

        window.addEventListener('resize', () => { resize(); initParticles(); });

        if (!isMobile) {
            document.addEventListener('mousemove', e => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            document.addEventListener('mouseleave', () => {
                mouse.x = -9999;
                mouse.y = -9999;
            });
        } else {
            document.addEventListener('touchmove', e => {
                const t = e.touches[0];
                mouse.x = t.clientX;
                mouse.y = t.clientY;
            }, { passive: true });
            document.addEventListener('touchend', () => {
                mouse.x = -9999;
                mouse.y = -9999;
            });
        }

        // ---- 3D Card Tilt (desktop only) ----
        if (!isMobile) {
            const wrapper = document.getElementById('cardWrapper');
            wrapper.addEventListener('mousemove', e => {
                const rect = wrapper.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                wrapper.style.transform = `rotateY(${x * 6}deg) rotateX(${-y * 6}deg)`;
            });
            wrapper.addEventListener('mouseleave', () => {
                wrapper.style.transform = 'rotateY(0) rotateX(0)';
            });
        }
    </script>
